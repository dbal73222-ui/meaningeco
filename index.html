<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>정부 지원사업 매칭 — 미닝에코</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
<div class="max-w-2xl mx-auto">

  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-900">정부 지원사업 매칭</h1>
    <p class="text-sm text-gray-400 mt-1">미닝에코 · 실시간 공고 데이터</p>
  </div>

  <!-- 필터 -->
  <div class="flex gap-2 mb-5 flex-wrap">
    <button onclick="filterData('all')"  id="btn-all"  class="px-3 py-1.5 bg-black text-white text-xs rounded-full font-medium">전체</button>
    <button onclick="filterData('창업')" id="btn-창업" class="px-3 py-1.5 bg-white border border-gray-200 text-xs rounded-full text-gray-500">창업</button>
    <button onclick="filterData('기술')" id="btn-기술" class="px-3 py-1.5 bg-white border border-gray-200 text-xs rounded-full text-gray-500">기술</button>
    <button onclick="filterData('금융')" id="btn-금융" class="px-3 py-1.5 bg-white border border-gray-200 text-xs rounded-full text-gray-500">금융</button>
    <button onclick="filterData('경영')" id="btn-경영" class="px-3 py-1.5 bg-white border border-gray-200 text-xs rounded-full text-gray-500">경영</button>
  </div>

  <div id="status" class="text-center py-8 text-sm text-gray-400">공고를 불러오는 중...</div>
  <div id="cards" class="space-y-4"></div>
  <p class="text-center text-xs text-gray-300 mt-6">데이터 출처: 중소벤처기업부 기업마당 · 공공데이터포털</p>
</div>

<script>
const PROXY = '/api/bizinfo';
let allData = [];

// reqstBeginEndDe 형식: "2026.01.01~2026.03.31" 또는 "2026-01-01 ~ 2026-03-31" 등
function parseEndDate(reqstBeginEndDe) {
  if (!reqstBeginEndDe) return null;
  // 물결(~) 기준으로 뒤쪽이 종료일
  const parts = reqstBeginEndDe.split('~');
  if (parts.length < 2) return null;
  const raw = parts[1].trim().replace(/\./g, '-').replace(/[^0-9-]/g, '');
  return raw || null;
}

function dday(reqstBeginEndDe) {
  const endStr = parseEndDate(reqstBeginEndDe);
  if (!endStr) return null;
  const end   = new Date(endStr);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff  = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
  if (diff < 0)  return null;
  if (diff === 0) return '오늘 마감';
  return 'D-' + diff;
}

function renderCards(data) {
  const container = document.getElementById('cards');
  const status    = document.getElementById('status');

  const active = data.filter(item => dday(item.reqstBeginEndDe) !== null);

  if (!active.length) {
    status.textContent   = '해당 분야 공고가 없어요.';
    status.style.display = 'block';
    container.innerHTML  = '';
    return;
  }

  status.style.display = 'none';
  container.innerHTML  = active.map(item => {
    const dd       = dday(item.reqstBeginEndDe);
    const isUrgent = dd && dd.startsWith('D-') && parseInt(dd.slice(2)) <= 7;

    // 신청기간 파싱
    const period = item.reqstBeginEndDe || '-';
    const [startRaw, endRaw] = period.split('~').map(s => s.trim());
    const fmt = s => s ? s.replace(/(\d{4})[-.](\d{2})[-.](\d{2})/, '$1.$2.$3') : '-';

    return `
      <div class="bg-white rounded-2xl border border-gray-100 p-5">
        <div class="flex justify-between items-start mb-3">
          <span class="text-xs font-bold px-2 py-1 rounded-full bg-blue-50 text-blue-600">
            ${item.pldirSportRealmLclasCodeNm || '지원사업'}
          </span>
          <span class="text-xs font-bold ${isUrgent ? 'text-red-500' : 'text-gray-400'}">${dd}</span>
        </div>
        <p class="font-bold text-base mb-1 leading-snug">${item.pblancNm || '-'}</p>
        <p class="text-xs text-gray-400 mb-3">${item.jrsdInsttNm || ''} · ${item.excInsttNm || '-'}</p>
        <div class="grid grid-cols-2 gap-2 mb-3">
          <div class="bg-gray-50 rounded-xl p-3">
            <p class="text-xs text-gray-400 mb-0.5">접수 시작</p>
            <p class="text-sm font-bold">${fmt(startRaw)}</p>
          </div>
          <div class="bg-gray-50 rounded-xl p-3">
            <p class="text-xs text-gray-400 mb-0.5">마감일</p>
            <p class="text-sm font-bold ${isUrgent ? 'text-red-500' : ''}">${fmt(endRaw)}</p>
          </div>
        </div>
        <a href="${item.pblancUrl || item.rceptEngnHmpgUrl || '#'}" target="_blank"
           class="block w-full py-2.5 rounded-xl bg-black text-white text-xs font-bold text-center">
          공고 보기 →
        </a>
      </div>
    `;
  }).join('');
}

function filterData(type) {
  document.querySelectorAll('[id^="btn-"]').forEach(btn => {
    btn.className = 'px-3 py-1.5 bg-white border border-gray-200 text-xs rounded-full text-gray-500';
  });
  document.getElementById('btn-' + type).className =
    'px-3 py-1.5 bg-black text-white text-xs rounded-full font-medium';

  const filtered = type === 'all'
    ? allData
    : allData.filter(d => (d.pldirSportRealmLclasCodeNm || '').includes(type));
  renderCards(filtered);
}

async function loadData() {
  try {
    const res  = await fetch(`${PROXY}?pageNo=1&numOfRows=50`);
    const json = await res.json();

    // 새 API 응답 구조: body.items.item (배열 or 단일 객체)
    const raw = json?.items || [];
    allData = (Array.isArray(raw) ? raw : [raw])
      .filter(d => dday(d.reqstBeginEndDe) !== null)
      .sort((a, b) => {
        const ea = parseEndDate(a.reqstBeginEndDe) || '';
        const eb = parseEndDate(b.reqstBeginEndDe) || '';
        return ea.localeCompare(eb);
      });

    renderCards(allData);
  } catch (e) {
    console.error(e);
    document.getElementById('status').textContent =
      '데이터를 불러오지 못했어요. 잠시 후 다시 시도해주세요.';
  }
}

loadData();
</script>
</body>
</html>
