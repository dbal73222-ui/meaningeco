[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from   = "/api/bizinfo"
  to     = "/.netlify/functions/bizinfo"
  status = 200

[[redirects]]
  from   = "/api/ai"
  to     = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from   = "/api/naramarket"
  to     = "/.netlify/functions/naramarket"
  status = 200

[[redirects]]
  from   = "/api/bizinfo2"
  to     = "/.netlify/functions/bizinfo2"
  status = 200
